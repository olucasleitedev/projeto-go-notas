services:
  redpanda:
    image: redpandadata/redpanda:v24.2.4
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 1G
      - --reserve-memory
      - 0M
      - --node-id
      - "0"
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:9092
    ports:
      - "19092:9092"
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 5s
      timeout: 5s
      retries: 10

  notes-service:
    build:
      context: .
      args:
        SERVICE: notes-service
    environment:
      ADDR: ":8081"
      KAFKA_BROKERS: redpanda:9092
      KAFKA_ENABLED: "true"
    depends_on:
      redpanda:
        condition: service_healthy
    ports:
      - "8081:8081"

  audit-service:
    build:
      context: .
      args:
        SERVICE: audit-service
    environment:
      ADDR: ":8082"
      KAFKA_BROKERS: redpanda:9092
      KAFKA_ENABLED: "true"
    depends_on:
      redpanda:
        condition: service_healthy
    ports:
      - "8082:8082"

  gateway:
    build:
      context: .
      args:
        SERVICE: gateway
    environment:
      ADDR: ":8080"
      NOTES_SERVICE_URL: http://notes-service:8081
      AUDIT_SERVICE_URL: http://audit-service:8082
    depends_on:
      - notes-service
      - audit-service
    ports:
      - "8080:8080"
