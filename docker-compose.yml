services:
  postgres-notes:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: notes
      POSTGRES_PASSWORD: notes
      POSTGRES_DB: notes
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notes -d notes"]
      interval: 3s
      timeout: 3s
      retries: 10

  postgres-audit:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: audit
      POSTGRES_PASSWORD: audit
      POSTGRES_DB: audit
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U audit -d audit"]
      interval: 3s
      timeout: 3s
      retries: 10

  redpanda:
    image: redpandadata/redpanda:v24.2.4
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 1G
      - --reserve-memory
      - 0M
      - --node-id
      - "0"
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:9092
    ports:
      - "19092:9092"
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 5s
      timeout: 5s
      retries: 10

  notes-service:
    build:
      context: .
      args:
        SERVICE: notes-service
    environment:
      ADDR: ":8081"
      KAFKA_BROKERS: redpanda:9092
      KAFKA_ENABLED: "true"
      NOTES_DATABASE_URL: postgres://notes:notes@postgres-notes:5432/notes?sslmode=disable
    depends_on:
      postgres-notes:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    ports:
      - "8081:8081"

  audit-service:
    build:
      context: .
      args:
        SERVICE: audit-service
    environment:
      ADDR: ":8082"
      KAFKA_BROKERS: redpanda:9092
      KAFKA_ENABLED: "true"
      AUDIT_DATABASE_URL: postgres://audit:audit@postgres-audit:5432/audit?sslmode=disable
    depends_on:
      postgres-audit:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    ports:
      - "8082:8082"

  gateway:
    build:
      context: .
      args:
        SERVICE: gateway
    environment:
      ADDR: ":8080"
      NOTES_SERVICE_URL: http://notes-service:8081
      AUDIT_SERVICE_URL: http://audit-service:8082
    depends_on:
      - notes-service
      - audit-service
    ports:
      - "8080:8080"
