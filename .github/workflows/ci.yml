name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Vet
        run: go vet ./...

      - name: Unit tests
        run: go test $(go list ./... | grep -v /tests/integration | grep -v node_modules) -race -count=1

      - name: Build services
        run: |
          go build -o /dev/null ./cmd/gateway
          go build -o /dev/null ./cmd/notes-service
          go build -o /dev/null ./cmd/audit-service

  integration:
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Start stack
        run: docker compose up -d --build

      - name: Wait for gateway
        run: |
          for i in $(seq 1 40); do
            if curl -sf http://localhost:8080/health; then
              echo "gateway ready"
              exit 0
            fi
            sleep 3
          done
          docker compose logs
          exit 1

      - name: Integration tests
        run: go test -tags=integration ./tests/integration/... -count=1 -v
        env:
          GATEWAY_URL: http://localhost:8080
          NOTES_DATABASE_URL: postgres://notes:notes@localhost:5433/notes?sslmode=disable

      - name: Teardown
        if: always()
        run: docker compose down -v
